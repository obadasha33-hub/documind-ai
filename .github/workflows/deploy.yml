# ============================================
# CI/CD WORKFLOW - Deploys to Cloudflare Workers + Pages
# ============================================
# Required GitHub Secrets (Settings → Secrets → Actions):
# - CLOUDFLARE_API_TOKEN
# - CLOUDFLARE_ACCOUNT_ID
# - GH_PAT (for Advisory DB access)
# - GEMINI_API_KEY (optional)

name: Deploy Architecture Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  WRANGLER_VERSION: "latest"

jobs:
  # --------------------------------------------
  # LINT & TYPECHECK (runs on every PR)
  # --------------------------------------------
  lint-and-test:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test

  # --------------------------------------------
  # BUILD & DEPLOY API (Cloudflare Workers)
  # --------------------------------------------
  deploy-api:
    name: Deploy API to Cloudflare Workers
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          environment: production

  # --------------------------------------------
  # BUILD & DEPLOY WEB (Cloudflare Pages)
  # --------------------------------------------
  deploy-web:
    name: Deploy Web to Cloudflare Pages
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Web
        run: npm run build --workspace=apps/web
        env:
          VITE_API_URL: https://arch-analysis-api.your-domain.workers.dev

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: arch-analysis-web
          directory: apps/web/dist
          branch: main

  # --------------------------------------------
  # RUN OSV SCANNER ON REPO (Security Gate)
  # --------------------------------------------
  security-scan:
    name: Security Scan (OSV)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install osv-scanner
        run: go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2

      -v

      - name: Run vulnerability scan
        run: osv-scanner scan --recursive .

  # --------------------------------------------
  # NOTIFY ON FAILURE
  # --------------------------------------------
  notify-failure:
    name: Notify Failure
    needs: [lint-and-test, deploy-api, deploy-web, security-scan]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        run: |
          echo "Deployment failed! Check GitHub Actions for details."
          # Add Slack/Discord webhook here if needed