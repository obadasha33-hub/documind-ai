name = "arch-analysis-api"
main = "apps/api/src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "arch-analysis-db"
database_id = "e3c99d7a-8ed5-4b0a-ab6c-44ed36038a69"

[[kv_namespaces]]
binding = "ASSETS"
id = "b16cb9b4e2a24677864585be3cd80d72"

[[kv_namespaces]]
binding = "CACHE"
id = "4337f551b00743f392156ec1a7bb9f22"

[[queues.producers]]
binding = "JOBS"
queue = "arch-analysis-jobs"

[[queues.consumers]]
queue = "arch-analysis-jobs"
max_batch_size = 5
max_batch_timeout = 30

[vars]
NODE_ENV = "production"
LOG_LEVEL = "info"

[env.staging]
name = "arch-analysis-api-staging"
vars = { NODE_ENV = "staging" }

[env.production]
name = "arch-analysis-api"
vars = { NODE_ENV = "production" }